# Backend secret. Mongo creds must match database/01-secret.yaml (the shared DB).
apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: gateway-backend
type: Opaque
stringData:
  jwt-secret:     "super_secret_key"
  mongo-user:     "admin"
  mongo-password: "password"
  mongo-auth-db:  "admin"

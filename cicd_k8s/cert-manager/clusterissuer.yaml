# Let's Encrypt issuer, DNS-01 challenge via Route53. cert-manager creates a TXT record in the
# hobbyez.com zone to prove control, then fetches the cert. No port-80 dependency (unlike HTTP-01).
# Credentials come from the route53-creds Secret (created from env, not committed).
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: itdefined.org@gmail.com
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - dns01:
          route53:
            region: ap-south-1
            hostedZoneID: Z07010022C4LQ7Z9ZKUKL
            accessKeyIDSecretRef:
              name: route53-creds
              key: access-key-id
            secretAccessKeySecretRef:
              name: route53-creds
              key: secret-access-key

# HTTPRoutes live in the app namespaces and attach to the Gateway (cross-namespace).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: frontend
  namespace: gateway-frontend
spec:
  parentRefs:
    - name: acadcart-gateway
      namespace: default
  hostnames:
    - "gateway-api.hobbyez.com"
  rules:
    - backendRefs:
        - name: frontend
          port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: backend
  namespace: gateway-backend
spec:
  parentRefs:
    - name: acadcart-gateway
      namespace: default
  hostnames:
    - "gateway-api.backend.hobbyez.com"
  rules:
    - backendRefs:
        - name: backend
          port: 3000

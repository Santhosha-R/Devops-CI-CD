# Mongo root credentials. The root user is created in the "admin" database, so the backend's
# MONGO_AUTH_SOURCE must be "admin". Demo values — rotate for anything real.
apiVersion: v1
kind: Secret
metadata:
  name: mongo-secret
  namespace: database
type: Opaque
data:
  root-username: YWRtaW4=          # admin
  root-password: cGFzc3dvcmQ=      # password
  mongo-auth-db: YWRtaW4=          # admin
